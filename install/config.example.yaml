# Agent Configuration — Example
# The real config is generated by the installer and encrypted.
# This file documents the structure for reference.

# Human Companion
human_name: 'Human'
human_full_name: ''
human_email: 'human@example.com'

# Security
security_question: 'What was the name of my first pet?'
security_answer: 'Biscuit'

# Cloud Providers
# Models are auto-discovered from each provider during install.
# The examples below are illustrative — the installer queries each
# provider's /v1/models endpoint and selects the best available models.
# Groq, Cerebras, and OpenRouter are mandatory. Mistral is optional.
providers:
  - name: groq
    api_base: https://api.groq.com/openai
    api_key: gsk_xxxxx
    models:
      - qwen/qwen3-32b
      - openai/gpt-oss-120b
      - moonshotai/kimi-k2-instruct
      - meta-llama/llama-4-scout-17b-16e-instruct
  - name: cerebras
    api_base: https://api.cerebras.ai
    api_key: csk_xxxxx
    models:
      - qwen3-235b-a22b
      - qwen3-32b
      - llama-4-scout-17b-16e-instruct
      - gpt-oss-120b
  - name: openrouter
    api_base: https://openrouter.ai/api
    api_key: sk-or-xxxxx
    models:
      - meta-llama/llama-3.3-70b-instruct:free
      - deepseek/deepseek-r1-0528:free
      - moonshotai/kimi-k2:free
      - openai/gpt-oss-120b:free
  - name: mistral            # optional
    api_base: https://api.mistral.ai
    api_key: xxxxx
    models:
      - mistral-small-latest
      - mistral-large-latest
      - open-mistral-nemo

# Local Fallback
local_fallback:
  api_base: http://localhost:11434
  model: qwen3:8b

# Runtime
loop_interval: 600
thinking_mode: adaptive
command_timeout: 120
